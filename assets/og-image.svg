<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#141d33"/>
    </linearGradient>
    <linearGradient id="swatch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="dock" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#c7d2e6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>

  <!-- icon mark, centered group -->
  <g transform="translate(478, 148)">
    <rect x="47" y="65" width="150" height="106" rx="16" fill="none" stroke="#e2e8f0" stroke-width="14"/>
    <line x1="122" y1="65" x2="122" y2="171" stroke="#e2e8f0" stroke-width="14"/>
    <rect x="28" y="184" width="188" height="15" rx="7.5" fill="url(#dock)"/>
    <rect x="168" y="40" width="62" height="62" rx="15" fill="url(#swatch)" stroke="#0b1220" stroke-width="7"/>
  </g>

  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="72" fill="url(#text)">Theme<tspan fill="#22d3ee">Dock</tspan></text>
  <text x="600" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="26" fill="#94a3b8">Self-hosted custom CSS themes for Unraid &amp; your containers</text>
</svg>
