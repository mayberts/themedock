<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="swatch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="dock" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#a5b4cf"/>
    </linearGradient>
  </defs>

  <!-- icon mark -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect x="47" y="65" width="106" height="75" rx="11" fill="none" stroke="#e2e8f0" stroke-width="10"/>
  <line x1="100" y1="65" x2="100" y2="140" stroke="#e2e8f0" stroke-width="10"/>
  <rect x="34" y="153" width="132" height="11" rx="5.5" fill="url(#dock)"/>
  <rect x="120" y="47" width="44" height="44" rx="11" fill="url(#swatch)" stroke="#0b1220" stroke-width="5"/>

  <!-- wordmark -->
  <text x="228" y="128" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="88" fill="url(#text)">Theme<tspan fill="#22d3ee">Dock</tspan></text>
</svg>
