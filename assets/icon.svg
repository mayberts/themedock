<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="swatch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="dock" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- app-icon background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- container box -->
  <rect x="120" y="168" width="272" height="192" rx="28" fill="none" stroke="#e2e8f0" stroke-width="26"/>
  <line x1="256" y1="168" x2="256" y2="360" stroke="#e2e8f0" stroke-width="26"/>

  <!-- dock line -->
  <rect x="88" y="392" width="336" height="28" rx="14" fill="url(#dock)"/>

  <!-- theme swatch chip, overlapping top-right corner of container -->
  <rect x="308" y="120" width="112" height="112" rx="28" fill="url(#swatch)" stroke="#0b1220" stroke-width="12"/>
</svg>
